<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sites</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      color: #e8e0d5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .wrap { max-width: 440px; width: 100%; }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(232,224,213,0.28);
      margin-bottom: 36px;
    }

    .list { display: flex; flex-direction: column; gap: 10px; }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border: 1px solid rgba(232,224,213,0.09);
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      background: rgba(255,255,255,0.015);
      transition: border-color 0.16s ease, background 0.16s ease;
    }
    .card:hover {
      border-color: rgba(232,224,213,0.22);
      background: rgba(255,255,255,0.035);
    }
    .card:active { background: rgba(255,255,255,0.055); }

    .card-name { font-size: 15px; font-weight: 600; letter-spacing: 0.01em; }
    .card-desc { font-size: 12px; color: rgba(232,224,213,0.38); margin-top: 3px; }
    .card-arrow { color: rgba(232,224,213,0.25); font-size: 17px; flex-shrink: 0; }

    .footer {
      margin-top: 36px;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: rgba(232,224,213,0.16);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">Sites</p>

    <div class="list">
      <a class="card" href="noa-landing/">
        <div>
          <div class="card-name">Noa</div>
          <div class="card-desc">Your AI financial navigator</div>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a class="card" href="agency/">
        <div>
          <div class="card-name">Aldric Group</div>
          <div class="card-desc">Intelligent marketing. Built to scale.</div>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a class="card" href="axontra/">
        <div>
          <div class="card-name">Axontra Partners</div>
          <div class="card-desc">Operational intelligence for brokerages.</div>
        </div>
        <span class="card-arrow">→</span>
      </a>
    </div>

    <p class="footer">GitHub Pages</p>
  </div>
</body>
</html>
