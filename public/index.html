<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/noa-icon.svg" type="image/svg+xml" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#111318" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Noa" />
    <meta name="description" content="Noa — your personal AI financial navigator. Talk to Noa about your money." />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Noa</title>
    <style>
      /* Force black background on html/body — prevents white flash on any overflow/bounce */
      html {
        background-color: #000;
        /* 100dvh = dynamic viewport height — excludes browser chrome on mobile */
        height: 100dvh;
      }
      body {
        background-color: #000;
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: none;
        touch-action: none;
        margin: 0;
        padding: 0;
        -webkit-text-size-adjust: none;
        text-size-adjust: none;
      }
      #root {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #000;
      }
      * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }
      input, textarea, select {
        /* 16px prevents iOS Safari auto-zoom on input focus */
        font-size: 16px !important;
        touch-action: manipulation;
        /* Prevent iOS Safari from adjusting font sizes */
        -webkit-text-size-adjust: 100%;
      }
      button, a, [role="button"] {
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Noa loading skeleton — removed by React on first mount -->
      <div id="noa-skeleton" style="position:fixed;inset:0;background:#111318;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;">
        <div id="noa-sk-orb" style="width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#d8cebe,#C8B89A 55%,#7a6a52);animation:noaOrbPulse 2.4s ease-in-out infinite;box-shadow:0 0 18px 6px rgba(200,184,154,0.28);"></div>
        <div style="font-size:9px;letter-spacing:0.18em;color:rgba(200,184,154,0.38);text-transform:uppercase;animation:noaBlink 2.4s ease-in-out infinite;">noa</div>
        <div style="position:absolute;bottom:32px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:0.05em;color:rgba(232,221,208,0.14);">Your Financial Navigator</div>
      </div>
      <style>
        @keyframes noaOrbPulse {
          0%,100% { transform:scale(1);   box-shadow:0 0 18px 6px rgba(200,184,154,0.28); }
          50%     { transform:scale(1.08);box-shadow:0 0 28px 10px rgba(200,184,154,0.50); }
        }
        @keyframes noaBlink {
          0%,100% { opacity:0.38; }
          50%     { opacity:0.65; }
        }
      </style>
    </div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
