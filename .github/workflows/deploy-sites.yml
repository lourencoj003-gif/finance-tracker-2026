name: Deploy Static Sites to GitHub Pages

# Deploys static HTML sites only — NO build step, NO npm install.
# The React app (Noa) is deployed separately via Vercel.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site folder
        run: |
          mkdir -p _site
          cp -r public/agency   _site/agency
          cp -r public/axontra  _site/axontra
          cp -r noa-landing     _site/noa-landing
          cp    pages-index.html _site/index.html
          # Prevent GitHub Pages from running Jekyll processing
          touch _site/.nojekyll
          # Prevent Vercel from treating gh-pages branch as a deployable project
          echo '{"github":{"silent":true}}' > _site/vercel.json

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: _site
          clean: true
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
